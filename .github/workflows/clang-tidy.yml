name: Check clang-tidy

on:
  push:
    branches-ignore:
      - gh-readonly-queue/**
      - master
  pull_request:
  merge_group:

jobs:
  check-clang-tidy:
    runs-on: ubuntu-latest
    env:
      CARGO_HTTP_MULTIPLEXING: false
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Prepare Linux
      run: |
        sudo apt-get update -y
        sudo apt-get install pkg-config cmake ninja-build libfreetype6-dev libnotify-dev libsdl2-dev libsqlite3-dev libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libswscale-dev libx264-dev libglew-dev -y

    - name: Install Vulkan SDK
      uses: humbletim/install-vulkan-sdk@v1.2
      with:
        version: 1.3.296.0
        cache: true

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Determine changed C/C++ source files
      id: changed-cpp
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
          BASE_SHA="${{ github.event.merge_group.base_sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
          BASE_SHA="$(git rev-parse HEAD^)"
        fi

        git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}" | grep -E '^src/.*\.(c|cpp)$' > changed_cpp_files.txt || true
        if [[ -s changed_cpp_files.txt ]]; then
          echo "has_files=true" >> "${GITHUB_OUTPUT}"
        else
          echo "has_files=false" >> "${GITHUB_OUTPUT}"
        fi

    - name: Install Clang 20
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg lsb-release
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 20 all

    - name: Run clang-tidy on changed files
      run: |
        if [[ "${{ steps.changed-cpp.outputs.has_files }}" != "true" ]]; then
          echo "No changed C/C++ source files to check."
          exit 0
        fi
        cmake -S . -B clang-tidy -G Ninja \
          -DCMAKE_CXX_COMPILER=clang++-20 \
          -DCMAKE_C_COMPILER=clang-20 \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_BUILD_TYPE=Debug \
          -Werror=dev
        xargs -a changed_cpp_files.txt -d '\n' clang-tidy-20 -p clang-tidy -warnings-as-errors='*'
